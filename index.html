<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Be+Vietnam+Pro:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<title>111 ngày yêu</title>
</head>

<body>

<!-- 🎵 nhạc -->
<audio id="music" src="assets/music.mp3" loop></audio>

<!-- PAGE 1 -->
<div class="page active" id="p1">
    <div class="title">Ngày chúng mình yêu</div>

    <div class="couple">
        <div class="avatar">
            <img src="assets/avatar1.jpg">
            <div>Khang</div>
        </div>

        <div class="heart-mid">❤</div>

        <div class="avatar">
            <img src="assets/avatar2.jpg">
            <div>Hà</div>
        </div>
    </div>

    <div class="date">25/12/2025 → 16/04/2026</div>

    <div class="time">
        <div class="box" id="d">0d</div>
        <div class="box" id="h">0h</div>
        <div class="box" id="m">0m</div>
        <div class="box" id="s">0s</div>
    </div>

    <div class="hint">Chạm vào màn hình</div>
</div>

<!-- PAGE 2 -->
<div class="page" id="p2">
    <div class="gallery" id="gallery"></div>
</div>

<!-- PAGE 3 -->
<div class="page" id="p3">
    <div class="card" id="cardText"></div>
</div>

<script src="script.js"></script>
</body>
</html>
